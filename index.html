<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐰 个人网站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: #fdf6f0;
            color: #4a3742;
            min-height: 100vh;
            padding: 24px 16px;
        }

        .container { max-width: 560px; margin: 0 auto; }

        /* 个人主页大卡片 */
        .profile-card {
            background: #fff;
            border-radius: 18px;
            padding: 28px 22px 20px;
            box-shadow: 0 2px 16px rgba(180, 140, 130, 0.10);
            text-align: center;
            margin-bottom: 20px;
        }

        .profile-avatar {
            width: 80px; height: 80px; border-radius: 50%;
            background: #f2dcd5; margin: 0 auto 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 36px; color: #c49a8c; overflow: hidden;
        }
        .profile-avatar img {
            width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
        }

        .profile-card h2 { font-size: 22px; color: #5e3e3e; margin-bottom: 4px; }
        .profile-card .bio { font-size: 13px; color: #b89b8b; margin-bottom: 18px; }

        /* 碎碎念区域 */
        .diary-section {
            text-align: left;
            margin-top: 16px;
        }
        .diary-section h4 {
            font-size: 13px; color: #c49a8c; margin-bottom: 10px; letter-spacing: 1px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .diary-toggle {
            font-size: 12px; color: #c49a8c; cursor: pointer; user-select: none;
        }
        .diary-toggle:hover { color: #8b5a5a; }

        .diary-list-inner.collapsed { max-height: 150px; overflow: hidden; }

        /* 名片卡片通用 */
        .namecard {
            background: #fff;
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 10px;
            box-shadow: 0 2px 10px rgba(180, 140, 130, 0.05);
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .namecard .avatar-mini {
            width: 38px; height: 38px; border-radius: 50%;
            background: #f2dcd5;
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: #c49a8c; overflow: hidden;
        }
        .namecard .avatar-mini img {
            width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
        }

        .namecard .card-body {
            flex: 1;
            min-width: 0;
        }
        .namecard .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .namecard .card-name {
            font-size: 14px; font-weight: 600; color: #5e3e3e;
        }
        .namecard .card-time {
            font-size: 11px; color: #ccb2a5;
        }
        .namecard .card-content {
            font-size: 14px; color: #6b5050; line-height: 1.5;
        }
        .namecard .card-lock {
            font-size: 12px; color: #d4a99a;
            margin-left: 8px;
        }

        /* 提问卡片的回答部分 */
        .answer-box {
            background: #fef9f6;
            border-radius: 10px;
            padding: 10px 14px;
            margin-top: 8px;
            font-size: 14px; color: #7a6a5f; line-height: 1.5;
        }
        .no-answer {
            margin-top: 8px; font-size: 13px; color: #d4bfb5; font-style: italic;
        }

        /* 画廊 / 链接 */
        .gallery-section { margin-top: 14px; text-align: left; }
        .gallery-section h4 { font-size: 13px; color: #c49a8c; margin-bottom: 8px; letter-spacing: 1px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .gallery-grid img {
            width: 100%; aspect-ratio: 1/1; object-fit: cover;
            border-radius: 10px; background: #f2e2da; cursor: pointer; transition: transform 0.2s;
        }
        .gallery-grid img:hover { transform: scale(1.05); }

        .links-section { margin-top: 14px; text-align: left; }
        .links-section h4 { font-size: 13px; color: #c49a8c; margin-bottom: 8px; letter-spacing: 1px; }
        .link-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .link-tag {
            display: inline-block; background: #f2dcd5; color: #8b5a5a;
            padding: 6px 14px; border-radius: 20px; font-size: 13px;
            text-decoration: none; transition: background 0.2s;
        }
        .link-tag:hover { background: #e6c7bb; }

        .divider { text-align: center; color: #dcc5b8; font-size: 18px; margin: 8px 0 16px; letter-spacing: 4px; }

        .ask-card {
            background: #fff; border-radius: 18px; padding: 20px;
            box-shadow: 0 2px 16px rgba(180, 140, 130, 0.10); margin-bottom: 20px;
        }

        .ask-card textarea {
            width: 100%; height: 80px; border: 1.5px solid #f0dbd0;
            border-radius: 12px; padding: 12px 14px; font-size: 15px;
            font-family: inherit; resize: none; outline: none;
            transition: border-color 0.2s; background: #fefcf9; color: #4a3742;
        }
        .ask-card textarea:focus { border-color: #d4a99a; }

        .btn-ask {
            background: #d4a99a; color: #fff; border: none;
            padding: 10px 24px; border-radius: 24px; font-size: 14px;
            cursor: pointer; transition: background 0.2s; font-family: inherit;
        }
        .btn-ask:hover { background: #c49585; }

        .empty-state { text-align: center; padding: 40px 20px; color: #d4bfb5; }
        .footer { text-align: center; margin-top: 36px; }
        .footer a { color: #ccb2a5; font-size: 13px; text-decoration: none; }
        .footer a:hover { color: #b8846e; }

        .admin-panel {
            background: #fff; border-radius: 18px; padding: 20px;
            box-shadow: 0 2px 16px rgba(180, 140, 130, 0.10);
            margin-top: 16px; display: none;
        }
        .admin-panel h3 { font-size: 17px; margin-bottom: 12px; color: #5e3e3e; }
        .admin-panel h4 {
            font-size: 14px; color: #b8846e; margin: 16px 0 8px;
            border-top: 1px solid #f5e8e0; padding-top: 14px;
        }
        .admin-panel .row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
        .admin-panel input, .admin-panel textarea {
            padding: 9px 12px; border: 1.5px solid #f0dbd0;
            border-radius: 10px; font-size: 14px; background: #fefcf9; color: #4a3742;
        }
        .btn-small {
            background: #d4a99a; color: #fff; border: none;
            padding: 8px 16px; border-radius: 20px; font-size: 13px; cursor: pointer;
        }
        .btn-small:hover { background: #c49585; }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #5e3e3e; color: #fff; padding: 10px 24px;
            border-radius: 24px; font-size: 14px; z-index: 1000;
            animation: fadeInOut 2s forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            75% { opacity: 1; }
            100% { opacity: 0; }
        }

        .lightbox {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            z-index: 999; justify-content: center; align-items: center;
        }
        .lightbox img { max-width: 90%; max-height: 85%; border-radius: 12px; }
        .lightbox.active { display: flex; }

        @media (max-width: 400px) {
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 个人主页大卡片 -->
        <div class="profile-card">
            <div class="profile-avatar" id="avatarContainer">
                <img id="avatarImg" src="" alt="头像" style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:none;">
                <span id="avatarEmoji">🌸</span>
            </div>
            <h2>Nan</h2>
            <p class="bio">网站用于互动or自娱自乐。感兴趣的都可以进行提问。&gt;&lt;</p>

            <div class="diary-section">
                <h4>
                    📝 碎碎念
                    <span class="diary-toggle" id="diaryToggle">收起 ▲</span>
                </h4>
                <div class="diary-list-inner" id="diaryListInner">
                    <div id="diaryList"></div>
                </div>
            </div>

            <div class="gallery-section">
                <h4>🖼️ 画册</h4>
                <div class="gallery-grid" id="galleryGrid"></div>
            </div>

            <div class="links-section">
                <h4>🔗 找到我</h4>
                <div class="link-tags" id="linkTags"></div>
            </div>
        </div>

        <div class="divider">· · ·</div>

        <!-- 提问箱 -->
        <div class="ask-card">
            <textarea id="questionInput" placeholder="写下你想问的...uwu"></textarea>
            <div style="display: flex; align-items: center; gap: 16px; margin-top: 10px;">
                <label style="font-size: 13px; color: #b8a098;">
                    <input type="checkbox" id="showNameCheck"> 公开我的昵称
                </label>
                <input type="text" id="nameInput" placeholder="输入你的昵称"
                       style="flex:1; padding:6px 10px; border:1.5px solid #f0dbd0; border-radius:8px; display:none; background:#fefcf9;">
            </div>
            <div style="display:flex; justify-content:space-between; margin-top:12px;">
                <span style="font-size:12px;color:#ccb2a5;">🔒 默认匿名</span>
                <button class="btn-ask" id="askBtn">发送提问</button>
            </div>
        </div>

        <div id="questionList" class="qa-list"></div>

        <div class="footer">
            <a href="#" id="adminToggle">⚙️ 管理后台</a>
        </div>

        <div class="admin-panel" id="adminPanel">
            <h3>🔐 管理员登录</h3>
            <div class="row" id="loginRow">
                <input type="password" id="adminPassword" placeholder="输入管理密码">
                <button class="btn-small" id="loginBtn">登录</button>
            </div>
            <div id="adminContent" style="display:none;"></div>
        </div>

        <div class="lightbox" id="lightbox" onclick="this.classList.remove('active')">
            <img src="" id="lightboxImg">
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://hzvwewaorvzyngmtbmls.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6dndld2FvcnZ6eW5nbXRibWxzIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MDIwNjI3NCwiZXhwIjoyMDk1NzgyMjc0fQ.cgPXKnDYsrcNPzNmB-5vcAHNnSUz68hr2MizpoXtM7Y';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const ADMIN_PASSWORD = '1115';
        let isAdmin = false;
        let profileData = { diaries: [], gallery: [], links: [], avatar: '' };

        // 工具函数
        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast'; t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }
        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str; return d.innerHTML;
        }
        function fmtTime(date) {
            const pad = n => String(n).padStart(2,'0');
            return `${pad(date.getMonth()+1)}/${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
        }

        // 折叠碎碎念
        let collapsed = false;
        document.getElementById('diaryToggle').addEventListener('click', function() {
            collapsed = !collapsed;
            document.getElementById('diaryListInner').classList.toggle('collapsed', collapsed);
            this.textContent = collapsed ? '展开 ▼' : '收起 ▲';
        });

        // ========== 加载问答（名片式） ==========
        async function loadQuestions() {
            const list = document.getElementById('questionList');
            try {
                const { data, error } = await sb.from('questions').select('*').order('created_at', { ascending: false }).limit(100);
                if (error) throw error;
                if (!data || data.length === 0) {
                    list.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>还没有问题</p></div>';
                    return;
                }
                list.innerHTML = '';
                data.forEach(q => {
                    const time = q.created_at ? fmtTime(new Date(q.created_at)) : '';
                    const isAnon = !q.author || q.author === '匿名';
                    const displayName = isAnon ? '匿名' : q.author;
                    const avatarContent = isAnon
                        ? '<span style="color:#d4bfb5;">?</span>'
                        : (q.author ? `<span>${esc(q.author[0])}</span>` : '?');
                    const avatarBg = isAnon ? '#f0e0d6' : '#f2dcd5';

                    const answerHtml = q.answer
                        ? `<div class="answer-box">💬 ${esc(q.answer)}</div>`
                        : '<div class="no-answer">等待回答中...</div>';

                    const card = document.createElement('div');
                    card.className = 'namecard';
                    card.innerHTML = `
                        <div class="avatar-mini" style="background:${avatarBg};">
                            ${avatarContent}
                        </div>
                        <div class="card-body">
                            <div class="card-header">
                                <span class="card-name">${esc(displayName)}</span>
                                <span class="card-time">${time}</span>
                            </div>
                            <div class="card-content">❓ ${esc(q.text)}</div>
                            ${answerHtml}
                        </div>
                    `;
                    list.appendChild(card);
                });
            } catch (e) { console.error(e); }
        }

        // ========== 加载个人主页（画廊、链接、头像） ==========
        async function loadProfile() {
            try {
                const { data, error } = await sb.from('profile').select('*').limit(100);
                if (error) throw error;
                profileData.gallery = []; profileData.links = []; profileData.avatar = '';
                if (data) {
                    data.forEach(item => {
                        if (item.type === 'gallery') profileData.gallery.push({ id: item.id, url: item.url });
                        if (item.type === 'link') profileData.links.push({ id: item.id, name: item.name, url: item.url });
                        if (item.type === 'avatar') profileData.avatar = item.url;
                    });
                }
                renderProfile();
            } catch (e) { console.error(e); }
        }

        // ========== 加载碎碎念（从 diaries 表） ==========
        async function loadDiaries() {
            try {
                const { data, error } = await sb.from('diaries').select('*').order('created_at', { ascending: false }).limit(50);
                if (error) throw error;
                profileData.diaries = [];
                if (data) {
                    data.forEach(d => {
                        profileData.diaries.push({
                            id: d.id,
                            text: d.content,
                            time: new Date(d.created_at),
                            isPrivate: d.is_private || false
                        });
                    });
                }
                renderProfile();
                if (isAdmin) renderAdmin();
            } catch (e) { console.error(e); }
        }

        // 渲染个人主页（碎碎念、画廊、链接）
        function renderProfile() {
            // 碎碎念（名片式）
            const diaryList = document.getElementById('diaryList');
            const visible = profileData.diaries.filter(d => isAdmin || !d.isPrivate);
            if (visible.length === 0) {
                diaryList.innerHTML = '<p style="color:#ccb2a5;font-size:13px;text-align:center;padding:10px;">还没有碎碎念</p>';
            } else {
                diaryList.innerHTML = visible.slice(0, 20).map(d => {
                    const time = fmtTime(d.time);
                    const lockHtml = d.isPrivate ? '<span class="card-lock">🔒 私密</span>' : '';
                    // 使用个人头像
                    const avatarHtml = profileData.avatar
                        ? `<img src="${esc(profileData.avatar)}" alt="">`
                        : '<span>🌸</span>';
                    return `
                        <div class="namecard">
                            <div class="avatar-mini">
                                ${avatarHtml}
                            </div>
                            <div class="card-body">
                                <div class="card-header">
                                    <span class="card-name">Nan ${lockHtml}</span>
                                    <span class="card-time">${time}</span>
                                </div>
                                <div class="card-content">${esc(d.text)}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            // 画廊
            const grid = document.getElementById('galleryGrid');
            if (profileData.gallery.length === 0) {
                grid.innerHTML = '<p style="color:#ccb2a5;font-size:13px;text-align:center;">还没有图片</p>';
            } else {
                grid.innerHTML = profileData.gallery.map(g =>
                    `<img src="${esc(g.url)}" onclick="event.stopPropagation();document.getElementById('lightboxImg').src='${esc(g.url)}';document.getElementById('lightbox').classList.add('active');">`
                ).join('');
            }

            // 链接
            const tags = document.getElementById('linkTags');
            if (profileData.links.length === 0) {
                tags.innerHTML = '<p style="color:#ccb2a5;font-size:13px;">还没有链接</p>';
            } else {
                tags.innerHTML = profileData.links.map(l =>
                    `<a href="${esc(l.url)}" target="_blank" class="link-tag">${esc(l.name)}</a>`
                ).join('');
            }

            // 主页大头像
            const avatarImg = document.getElementById('avatarImg');
            const avatarEmoji = document.getElementById('avatarEmoji');
            if (profileData.avatar) {
                avatarImg.src = profileData.avatar;
                avatarImg.style.display = 'block';
                avatarEmoji.style.display = 'none';
            } else {
                avatarImg.style.display = 'none';
                avatarEmoji.style.display = 'block';
            }
        }

        // ========== 提问 ==========
        document.getElementById('askBtn').addEventListener('click', async () => {
            const text = document.getElementById('questionInput').value.trim();
            if (!text) { showToast('请输入内容'); return; }
            const showName = document.getElementById('showNameCheck').checked;
            const name = showName ? document.getElementById('nameInput').value.trim() : '';
            if (showName && !name) { showToast('请填写昵称'); return; }
            await sb.from('questions').insert([{ text, answer: '', author: showName ? name : '匿名' }]);
            showToast('提问发送成功！');
            document.getElementById('questionInput').value = '';
            document.getElementById('showNameCheck').checked = false;
            document.getElementById('nameInput').style.display = 'none';
            document.getElementById('nameInput').value = '';
            loadQuestions();
        });

        document.getElementById('showNameCheck').addEventListener('change', function() {
            const inp = document.getElementById('nameInput');
            inp.style.display = this.checked ? 'block' : 'none';
            if (!this.checked) inp.value = '';
        });

        // ========== 管理后台 ==========
        const adminPanel = document.getElementById('adminPanel');
        document.getElementById('adminToggle').addEventListener('click', e => {
            e.preventDefault();
            adminPanel.style.display = adminPanel.style.display === 'block' ? 'none' : 'block';
        });

        document.getElementById('loginBtn').addEventListener('click', () => {
            if (document.getElementById('adminPassword').value === ADMIN_PASSWORD) {
                isAdmin = true;
                document.getElementById('loginRow').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                renderAdmin();
                renderProfile(); // 刷新显示私密碎碎念
                showToast('登录成功');
            } else showToast('密码错误');
        });

        async function renderAdmin() {
            const container = document.getElementById('adminContent');
            let allQ = [];
            try {
                const { data } = await sb.from('questions').select('*').order('created_at', { ascending: false }).limit(100);
                allQ = data || [];
            } catch(e) {}

            const unanswered = allQ.filter(q => !q.answer);
            const answered = allQ.filter(q => q.answer);

            let html = '<h4 style="margin-top:0;border-top:none;padding-top:0;">📬 回答问题</h4>';
            if (unanswered.length === 0) {
                html += '<p style="color:#b8846e;padding:10px;">🎉 全部回答完毕</p>';
            } else {
                html += unanswered.map(q => `
                    <div style="border-bottom:1px solid #f5e8e0; padding:8px 0;">
                        <div style="font-weight:600;">${esc(q.text)} ${q.author !== '匿名' ? `<span style="color:#b8846e;">— ${esc(q.author)}</span>` : ''}</div>
                        <div style="display:flex; gap:6px; margin-top:6px;">
                            <input id="reply-${q.id}" placeholder="回答..." style="flex:1;">
                            <button class="btn-small" data-answer="${q.id}">回复</button>
                        </div>
                    </div>
                `).join('');
            }

            if (answered.length > 0) {
                html += '<h4>✅ 已回答</h4>';
                html += answered.map(q => `<span style="cursor:pointer;margin:4px;background:#fef3ed;padding:2px 8px;border-radius:8px;" data-delete-q="${q.id}">${esc(q.text.substring(0,12))}... ❌</span>`).join('');
            }

            html += '<h4>🖼️ 更换头像</h4><div style="display:flex;gap:8px;"><input type="file" id="avatarFile"><button class="btn-small" id="uploadAvatar">上传</button></div>';

            html += '<h4>📝 发布碎碎念</h4><textarea id="newDiaryText" placeholder="内容..." style="width:100%;margin-bottom:8px;"></textarea><div style="display:flex;align-items:center;gap:10px;"><label><input type="checkbox" id="diaryPrivate"> 🔒 私密</label><button class="btn-small" id="addDiaryBtn">发布</button></div>';

            // 已有碎碎念管理
            html += '<div style="font-size:12px; margin-top:6px;">';
            profileData.diaries.forEach(d => {
                html += `<span style="cursor:pointer;background:#fef3ed;padding:2px 8px;border-radius:8px;margin:2px;" data-delete-diary="${d.id}">${d.isPrivate ? '🔒' : ''} ${esc(d.text.substring(0,10))}... ❌</span>`;
            });
            html += '</div>';

            html += '<h4>🖼️ 添加画册图片</h4><div style="display:flex;gap:8px;"><input id="newImageUrl" placeholder="图片链接" style="flex:1;"><button class="btn-small" id="addImageBtn">添加</button></div>';
            html += '<h4>🔗 添加链接</h4><div style="display:flex;gap:8px;"><input id="newLinkName" placeholder="名称"><input id="newLinkUrl" placeholder="地址"><button class="btn-small" id="addLinkBtn">添加</button></div>';
            html += '<div style="text-align:center;margin-top:16px;"><button class="btn-small" id="logoutBtn">退出登录</button></div>';

            container.innerHTML = html;

            // 事件绑定
            container.querySelectorAll('[data-answer]').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = btn.dataset.answer;
                    const input = document.getElementById(`reply-${id}`);
                    if (!input.value.trim()) return;
                    await sb.from('questions').update({ answer: input.value.trim() }).eq('id', id);
                    showToast('已回复'); loadQuestions(); renderAdmin();
                });
            });
            container.querySelectorAll('[data-delete-q]').forEach(span => {
                span.addEventListener('click', async () => {
                    if (confirm('删除问题？')) { await sb.from('questions').delete().eq('id', span.dataset.deleteQ); loadQuestions(); renderAdmin(); }
                });
            });
            container.querySelectorAll('[data-delete-diary]').forEach(span => {
                span.addEventListener('click', async () => {
                    if (confirm('删除碎碎念？')) { await sb.from('diaries').delete().eq('id', span.dataset.deleteDiary); loadDiaries(); }
                });
            });

            document.getElementById('uploadAvatar')?.addEventListener('click', async () => {
                const file = document.getElementById('avatarFile').files[0];
                if (!file) return;
                const name = `avatar_${Date.now()}.${file.name.split('.').pop()}`;
                await sb.storage.from('avatars').upload(name, file);
                const { data } = sb.storage.from('avatars').getPublicUrl(name);
                await sb.from('profile').delete().eq('type', 'avatar');
                await sb.from('profile').insert([{ type: 'avatar', url: data.publicUrl }]);
                showToast('头像已更新'); loadProfile();
            });

            document.getElementById('addDiaryBtn')?.addEventListener('click', async () => {
                const text = document.getElementById('newDiaryText').value.trim();
                if (!text) return;
                const isPrivate = document.getElementById('diaryPrivate').checked;
                await sb.from('diaries').insert([{ content: text, is_private: isPrivate }]);
                showToast('发布成功'); loadDiaries();
            });

            document.getElementById('addImageBtn')?.addEventListener('click', async () => {
                const url = document.getElementById('newImageUrl').value.trim();
                if (url) { await sb.from('profile').insert([{ type: 'gallery', url }]); showToast('已添加'); loadProfile(); }
            });

            document.getElementById('addLinkBtn')?.addEventListener('click', async () => {
                const name = document.getElementById('newLinkName').value.trim();
                const url = document.getElementById('newLinkUrl').value.trim();
                if (name && url) { await sb.from('profile').insert([{ type: 'link', name, url }]); showToast('已添加'); loadProfile(); }
            });

            document.getElementById('logoutBtn')?.addEventListener('click', () => {
                isAdmin = false;
                document.getElementById('loginRow').style.display = 'flex';
                document.getElementById('adminContent').style.display = 'none';
                container.innerHTML = '';
                renderProfile(); // 隐藏私密
            });
        }

        // 初始化
        loadQuestions();
        loadProfile();
        loadDiaries();
        setInterval(() => { loadQuestions(); loadProfile(); loadDiaries(); }, 15000);
    </script>
</body>
</html>
