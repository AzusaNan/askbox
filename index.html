<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📦 我的提问箱</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: #fdf6f0;
            color: #4a3742;
            min-height: 100vh;
            padding: 24px 16px;
        }

        .container { max-width: 560px; margin: 0 auto; }

        .profile-card {
            background: #fff;
            border-radius: 18px;
            padding: 28px 22px 20px;
            box-shadow: 0 2px 16px rgba(180, 140, 130, 0.10);
            text-align: center;
            margin-bottom: 20px;
        }

        .profile-avatar {
            width: 80px; height: 80px; border-radius: 50%;
            background: #f2dcd5; margin: 0 auto 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 36px; color: #c49a8c;
        }

        .profile-card h2 { font-size: 22px; color: #5e3e3e; margin-bottom: 4px; }
        .profile-card .bio { font-size: 13px; color: #b89b8b; margin-bottom: 18px; }

        .diary-section {
            text-align: left; background: #fef9f6; border-radius: 12px;
            padding: 16px; margin-top: 14px; max-height: 160px; overflow-y: auto;
        }

        .diary-section h4 { font-size: 13px; color: #c49a8c; margin-bottom: 8px; letter-spacing: 1px; }
        .diary-item { font-size: 13px; color: #6b5050; padding: 6px 0; border-bottom: 1px dashed #f2e2da; line-height: 1.5; }
        .diary-item:last-child { border-bottom: none; }
        .diary-date { font-size: 11px; color: #ccb2a5; margin-right: 6px; }

        .gallery-section { margin-top: 14px; text-align: left; }
        .gallery-section h4 { font-size: 13px; color: #c49a8c; margin-bottom: 8px; letter-spacing: 1px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .gallery-grid img {
            width: 100%; aspect-ratio: 1/1; object-fit: cover;
            border-radius: 10px; background: #f2e2da; cursor: pointer; transition: transform 0.2s;
        }
        .gallery-grid img:hover { transform: scale(1.05); }

        .links-section { margin-top: 14px; text-align: left; }
        .links-section h4 { font-size: 13px; color: #c49a8c; margin-bottom: 8px; letter-spacing: 1px; }
        .link-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .link-tag {
            display: inline-block; background: #f2dcd5; color: #8b5a5a;
            padding: 6px 14px; border-radius: 20px; font-size: 13px;
            text-decoration: none; transition: background 0.2s;
        }
        .link-tag:hover { background: #e6c7bb; }

        .divider { text-align: center; color: #dcc5b8; font-size: 18px; margin: 8px 0 16px; letter-spacing: 4px; }

        .ask-card {
            background: #fff; border-radius: 18px; padding: 20px;
            box-shadow: 0 2px 16px rgba(180, 140, 130, 0.10); margin-bottom: 20px;
        }

        .ask-card textarea {
            width: 100%; height: 80px; border: 1.5px solid #f0dbd0;
            border-radius: 12px; padding: 12px 14px; font-size: 15px;
            font-family: inherit; resize: none; outline: none;
            transition: border-color 0.2s; background: #fefcf9; color: #4a3742;
        }

        .ask-card textarea:focus { border-color: #d4a99a; }

        .ask-card .btn-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 12px; flex-wrap: wrap; gap: 8px;
        }

        .ask-card .hint { font-size: 12px; color: #ccb2a5; }

        .btn-ask {
            background: #d4a99a; color: #fff; border: none;
            padding: 10px 24px; border-radius: 24px; font-size: 14px;
            cursor: pointer; transition: background 0.2s, transform 0.15s; font-family: inherit;
        }
        .btn-ask:hover { background: #c49585; }
        .btn-ask:active { transform: scale(0.96); }

        .qa-list { display: flex; flex-direction: column; gap: 12px; }

        .qa-card {
            background: #fff; border-radius: 16px; padding: 18px 20px;
            box-shadow: 0 2px 12px rgba(180, 140, 130, 0.07);
            transition: transform 0.2s;
        }
        .qa-card:hover { transform: translateY(-2px); box-shadow: 0 4px 18px rgba(180, 140, 130, 0.12); }

        .qa-card .q-text { font-weight: 600; font-size: 15px; color: #5e3e3e; margin-bottom: 4px; }
        .qa-card .q-text::before { content: "❓ "; }
        .author-tag {
            font-size: 11px; color: #b8846e; background: #fef3ed;
            padding: 2px 8px; border-radius: 10px; margin-right: 4px;
            display: inline-block; vertical-align: middle;
        }
        .qa-card .a-text {
            font-size: 14px; color: #7a6a5f; background: #fef9f6;
            padding: 10px 14px; border-radius: 10px; margin-top: 8px; line-height: 1.5;
        }
        .qa-card .a-text::before { content: "💬 "; }
        .qa-card .no-answer { font-size: 13px; color: #d4bfb5; font-style: italic; margin-top: 6px; }
        .empty-state { text-align: center; padding: 50px 20px; color: #d4bfb5; }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

        .footer { text-align: center; margin-top: 36px; }
        .footer a { color: #ccb2a5; font-size: 13px; text-decoration: none; }
        .footer a:hover { color: #b8846e; text-decoration: underline; }

        .admin-panel {
            background: #fff; border-radius: 18px; padding: 20px;
            box-shadow: 0 2px 16px rgba(180, 140, 130, 0.10);
            margin-top: 16px; display: none;
        }

        .admin-panel h3 { font-size: 17px; margin-bottom: 12px; color: #5e3e3e; }
        .admin-panel h4 {
            font-size: 14px; color: #b8846e; margin: 16px 0 8px;
            border-top: 1px solid #f5e8e0; padding-top: 14px;
        }

        .admin-panel .row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }

        .admin-panel input[type="password"],
        .admin-panel input[type="text"],
        .admin-panel textarea {
            padding: 9px 12px; border: 1.5px solid #f0dbd0;
            border-radius: 10px; font-size: 14px; outline: none;
            background: #fefcf9; font-family: inherit; color: #4a3742;
        }

        .admin-panel input[type="password"] { flex: 1; }
        .admin-panel textarea { width: 100%; min-height: 60px; resize: vertical; }

        .admin-panel .btn-small {
            background: #d4a99a; color: #fff; border: none;
            padding: 9px 16px; border-radius: 20px; font-size: 13px;
            cursor: pointer; font-family: inherit; transition: background 0.2s; white-space: nowrap;
        }
        .admin-panel .btn-small:hover { background: #c49585; }

        .admin-item { border-bottom: 1px solid #f5e8e0; padding: 10px 0; }
        .admin-item:last-child { border-bottom: none; }
        .admin-item .q { font-weight: 600; font-size: 14px; margin-bottom: 6px; color: #5e3e3e; }
        .admin-done { text-align: center; color: #b8846e; padding: 10px; font-size: 14px; }
        .admin-mini-list { font-size: 12px; color: #b8a098; }
        .admin-mini-list span {
            background: #fef3ed; padding: 3px 8px; border-radius: 8px;
            margin: 2px; display: inline-block; cursor: pointer;
        }
        .admin-mini-list span:hover { background: #fce3d5; }

        .lightbox {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            z-index: 999; justify-content: center; align-items: center;
        }
        .lightbox img { max-width: 90%; max-height: 85%; border-radius: 12px; }
        .lightbox.active { display: flex; }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #5e3e3e; color: #fff; padding: 10px 24px;
            border-radius: 24px; font-size: 14px; z-index: 1000;
            animation: fadeInOut 2s forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            75% { opacity: 1; }
            100% { opacity: 0; }
        }

        @media (max-width: 400px) {
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="profile-card">
            <div class="profile-avatar">🌸</div>
            <h2>你的名字</h2>
            <p class="bio">这里写一句简介签名 ✨</p>

            <div class="diary-section">
                <h4>📝 碎碎念</h4>
                <div id="diaryList"><p style="color:#ccb2a5;font-size:13px;">还没有日记，去管理后台写一条吧~</p></div>
            </div>

            <div class="gallery-section">
                <h4>🖼️ 画册</h4>
                <div class="gallery-grid" id="galleryGrid">
                    <p style="color:#ccb2a5;font-size:13px;">还没有图片</p>
                </div>
            </div>

            <div class="links-section">
                <h4>🔗 找到我</h4>
                <div class="link-tags" id="linkTags">
                    <p style="color:#ccb2a5;font-size:13px;">还没有链接</p>
                </div>
            </div>
        </div>

        <div class="divider">· · ·</div>

        <div class="ask-card">
            <textarea id="questionInput" placeholder="写下你想问的..."></textarea>
            <div style="display: flex; align-items: center; gap: 16px; margin-top: 10px;">
                <label style="font-size: 13px; color: #b8a098; cursor: pointer;">
                    <input type="checkbox" id="showNameCheck" style="vertical-align: middle; margin-right: 4px;">
                    公开我的昵称
                </label>
                <input type="text" id="nameInput" placeholder="输入你的昵称"
                       style="flex: 1; padding: 6px 10px; border: 1.5px solid #f0dbd0; border-radius: 8px;
                              font-size: 13px; outline: none; display: none; background: #fefcf9; color: #4a3742;">
            </div>
            <div class="btn-row">
                <span class="hint">🔒 默认匿名，可勾选公开昵称</span>
                <button class="btn-ask" id="askBtn">发送提问</button>
            </div>
        </div>

        <div id="questionList" class="qa-list"></div>

        <div class="footer">
            <a href="#" id="adminToggle">⚙️ 管理后台</a>
        </div>

        <div class="admin-panel" id="adminPanel">
            <h3>🔐 管理员登录</h3>
            <div class="row" id="loginRow">
                <input type="password" id="adminPassword" placeholder="输入管理密码">
                <button class="btn-small" id="loginBtn">登录</button>
            </div>
            <div id="adminContent" style="display:none;"></div>
        </div>

        <div class="lightbox" id="lightbox" onclick="this.classList.remove('active')">
            <img src="" alt="预览图片" id="lightboxImg">
        </div>
    </div>

    <!-- ==================== Supabase SDK ==================== -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ==========================================
        // 🔴 已帮你填好 Supabase URL 和 Key
        // ==========================================
        const SUPABASE_URL = 'https://hzvwewaorvzyngmtbmls.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6dndld2FvcnZ6eW5nbXRibWxzIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MDIwNjI3NCwiZXhwIjoyMDk1NzgyMjc0fQ.cgPXKnDYsrcNPzNmB-5vcAHNnSUz68hr2MizpoXtM7Y';
        // ==========================================

        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const ADMIN_PASSWORD = '1115';
        let isAdmin = false;
        let profileData = { diaries: [], gallery: [], links: [] };

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ========== 加载问答列表 ==========
        async function loadQuestions() {
            const list = document.getElementById('questionList');
            try {
                const { data, error } = await sb
                    .from('questions')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(100);
                if (error) throw error;
                if (!data || data.length === 0) {
                    list.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>还没有问题，做第一个提问的人吧</p></div>`;
                    return;
                }
                list.innerHTML = '';
                data.forEach(q => {
                    const authorTag = q.author && q.author !== '匿名'
                        ? `<span class="author-tag">👤 ${escapeHtml(q.author)}</span>` : '';
                    const answerHtml = q.answer
                        ? `<div class="a-text">${escapeHtml(q.answer)}</div>`
                        : `<div class="no-answer">等待回答中...</div>`;
                    const card = document.createElement('div');
                    card.className = 'qa-card';
                    card.innerHTML = `<div class="q-text">${authorTag}${escapeHtml(q.text)}</div>${answerHtml}`;
                    list.appendChild(card);
                });
            } catch (e) {
                console.error(e);
                list.innerHTML = `<div class="empty-state"><p>加载失败，请检查是否已创建数据表</p></div>`;
            }
        }

        // ========== 加载个人主页 ==========
        async function loadProfile() {
            try {
                const { data, error } = await sb.from('profile').select('*').limit(200);
                if (error) throw error;
                profileData = { diaries: [], gallery: [], links: [] };
                if (data) {
                    data.forEach(item => {
                        if (item.type === 'diary') profileData.diaries.push({ id: item.id, text: item.text, time: new Date(item.created_at) });
                        if (item.type === 'gallery') profileData.gallery.push({ id: item.id, url: item.url });
                        if (item.type === 'link') profileData.links.push({ id: item.id, name: item.name, url: item.url });
                    });
                }
                profileData.diaries.sort((a, b) => b.time - a.time);
                renderProfile();
                if (isAdmin) renderAdmin();
            } catch (e) {
                console.error(e);
            }
        }

        function renderProfile() {
            const diaryList = document.getElementById('diaryList');
            if (profileData.diaries.length === 0) {
                diaryList.innerHTML = '<p style="color:#ccb2a5;font-size:13px;">还没有日记，去管理后台写一条吧~</p>';
            } else {
                diaryList.innerHTML = profileData.diaries.slice(0, 20).map(d => {
                    const date = d.time.toLocaleDateString('zh-CN', { month: 'numeric', day: 'numeric' });
                    return `<div class="diary-item"><span class="diary-date">${date}</span>${escapeHtml(d.text)}</div>`;
                }).join('');
            }

            const galleryGrid = document.getElementById('galleryGrid');
            if (profileData.gallery.length === 0) {
                galleryGrid.innerHTML = '<p style="color:#ccb2a5;font-size:13px;grid-column:1/-1;">还没有图片</p>';
            } else {
                galleryGrid.innerHTML = profileData.gallery.map(g =>
                    `<img src="${escapeHtml(g.url)}" alt="画廊" onclick="event.stopPropagation();document.getElementById('lightboxImg').src='${escapeHtml(g.url)}';document.getElementById('lightbox').classList.add('active');" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect fill=%22%23f2e2da%22 width=%22100%22 height=%22100%22/><text x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23ccb2a5%22 font-size=%2212%22>加载失败</text></svg>'">`
                ).join('');
            }

            const linkTags = document.getElementById('linkTags');
            if (profileData.links.length === 0) {
                linkTags.innerHTML = '<p style="color:#ccb2a5;font-size:13px;">还没有链接</p>';
            } else {
                linkTags.innerHTML = profileData.links.map(l =>
                    `<a href="${escapeHtml(l.url)}" target="_blank" class="link-tag">${escapeHtml(l.name)}</a>`
                ).join('');
            }
        }

        // ========== 提问 ==========
        document.getElementById('askBtn').addEventListener('click', async () => {
            const input = document.getElementById('questionInput');
            const text = input.value.trim();
            if (!text) { showToast('请输入问题内容哦～'); return; }

            const showName = document.getElementById('showNameCheck').checked;
            const name = showName ? document.getElementById('nameInput').value.trim() : '';
            if (showName && !name) { showToast('请填写你的昵称哦～'); return; }

            try {
                const { error } = await sb.from('questions').insert([{
                    text: text,
                    answer: '',
                    author: showName ? name : '匿名'
                }]);
                if (error) throw error;
                showToast('提问发送成功！');
                input.value = '';
                document.getElementById('showNameCheck').checked = false;
                document.getElementById('nameInput').style.display = 'none';
                document.getElementById('nameInput').value = '';
                loadQuestions();
            } catch (e) {
                showToast('发送失败，请检查数据表是否创建');
                console.error(e);
            }
        });

        document.getElementById('showNameCheck').addEventListener('change', function() {
            const nameInput = document.getElementById('nameInput');
            nameInput.style.display = this.checked ? 'block' : 'none';
            if (!this.checked) nameInput.value = '';
            if (this.checked) nameInput.focus();
        });

        document.getElementById('questionInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('askBtn').click();
            }
        });

        // ========== 管理面板 ==========
        const adminPanel = document.getElementById('adminPanel');
        document.getElementById('adminToggle').addEventListener('click', (e) => {
            e.preventDefault();
            adminPanel.style.display = adminPanel.style.display === 'block' ? 'none' : 'block';
        });

        document.getElementById('loginBtn').addEventListener('click', () => {
            const pwd = document.getElementById('adminPassword').value;
            if (pwd === ADMIN_PASSWORD) {
                isAdmin = true;
                document.getElementById('loginRow').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                renderAdmin();
                showToast('登录成功！');
            } else {
                showToast('密码错误');
            }
        });

        async function renderAdmin() {
            const container = document.getElementById('adminContent');
            let allQuestions = [];
            try {
                const { data } = await sb.from('questions').select('*').order('created_at', { ascending: false }).limit(100);
                allQuestions = data || [];
            } catch (e) { console.error(e); }

            const unanswered = allQuestions.filter(q => !q.answer);
            const answered = allQuestions.filter(q => q.answer);

            let html = '';

            html += '<h4 style="margin-top:0;border-top:none;padding-top:0;">📬 回答问题</h4>';
            if (unanswered.length === 0) {
                html += '<div class="admin-done">🎉 所有问题都已回答完毕</div>';
            } else {
                html += unanswered.map(q => `
                    <div class="admin-item">
                        <div class="q">${escapeHtml(q.text)} ${q.author !== '匿名' ? '<span style="font-size:11px;color:#b8846e;">— ' + escapeHtml(q.author) + '</span>' : ''}</div>
                        <div class="row">
                            <input type="text" id="replyInput-${q.id}" placeholder="输入你的回答..." style="flex:1;">
                            <button class="btn-small" data-action="answer" data-id="${q.id}">回复</button>
                        </div>
                    </div>`).join('');
            }

            if (answered.length > 0) {
                html += '<h4>✅ 已回答</h4><div class="admin-mini-list">';
                html += answered.map(q =>
                    `<span data-action="delete" data-id="${q.id}" title="点击删除">${escapeHtml(q.text.substring(0, 15))}... ❌</span>`
                ).join('');
                html += '</div>';
            }

            html += '<h4>📝 发布碎碎念</h4>';
            html += '<div class="row"><textarea id="newDiary" placeholder="今天想说什么..."></textarea></div>';
            html += '<div class="row"><button class="btn-small" id="addDiaryBtn">发布碎碎念</button></div>';

            if (profileData.diaries.length > 0) {
                html += '<div class="admin-mini-list">';
                html += profileData.diaries.map(d =>
                    `<span data-action="deleteProfile" data-id="${d.id}" title="点击删除">${escapeHtml(d.text.substring(0, 10))}... ❌</span>`
                ).join('');
                html += '</div>';
            }

            html += '<h4>🖼️ 添加画册图片</h4>';
            html += '<div class="row"><input type="text" id="newImageUrl" placeholder="粘贴图片链接..." style="flex:1;"><button class="btn-small" id="addImageBtn">添加</button></div>';
            if (profileData.gallery.length > 0) {
                html += '<div class="admin-mini-list">';
                html += profileData.gallery.map(g =>
                    `<span data-action="deleteProfile" data-id="${g.id}" title="点击删除">图片 ❌</span>`
                ).join('');
                html += '</div>';
            }

            html += '<h4>🔗 添加超链接</h4>';
            html += '<div class="row"><input type="text" id="newLinkName" placeholder="链接名称" style="flex:1;"><input type="text" id="newLinkUrl" placeholder="链接地址 https://..." style="flex:2;"><button class="btn-small" id="addLinkBtn">添加</button></div>';
            if (profileData.links.length > 0) {
                html += '<div class="admin-mini-list">';
                html += profileData.links.map(l =>
                    `<span data-action="deleteProfile" data-id="${l.id}" title="点击删除">${escapeHtml(l.name)} ❌</span>`
                ).join('');
                html += '</div>';
            }

            html += '<div style="text-align:center;margin-top:16px;"><button class="btn-small" style="background:#e8cec5;color:#8b5a5a;" id="logoutBtn">退出登录</button></div>';

            container.innerHTML = html;

            container.querySelectorAll('[data-action="answer"]').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = btn.dataset.id;
                    const input = document.getElementById(`replyInput-${id}`);
                    const answer = input.value.trim();
                    if (!answer) { showToast('回答不能为空'); return; }
                    const { error } = await sb.from('questions').update({ answer }).eq('id', id);
                    if (error) { showToast('回答失败'); console.error(error); return; }
                    showToast('回答成功！');
                    loadQuestions();
                    loadProfile();
                });
            });

            container.querySelectorAll('[data-action="delete"]').forEach(span => {
                span.addEventListener('click', async () => {
                    if (!confirm('确定删除吗？')) return;
                    await sb.from('questions').delete().eq('id', span.dataset.id);
                    showToast('已删除');
                    loadQuestions();
                    loadProfile();
                });
            });

            container.querySelectorAll('[data-action="deleteProfile"]').forEach(span => {
                span.addEventListener('click', async () => {
                    if (!confirm('确定删除吗？')) return;
                    await sb.from('profile').delete().eq('id', span.dataset.id);
                    showToast('已删除');
                    loadProfile();
                });
            });

            document.getElementById('addDiaryBtn')?.addEventListener('click', async () => {
                const text = document.getElementById('newDiary').value.trim();
                if (!text) { showToast('请输入内容'); return; }
                await sb.from('profile').insert([{ type: 'diary', text }]);
                showToast('碎碎念发布成功！');
                loadProfile();
            });

            document.getElementById('addImageBtn')?.addEventListener('click', async () => {
                const url = document.getElementById('newImageUrl').value.trim();
                if (!url) { showToast('请输入图片链接'); return; }
                await sb.from('profile').insert([{ type: 'gallery', url }]);
                showToast('图片添加成功！');
                loadProfile();
            });

            document.getElementById('addLinkBtn')?.addEventListener('click', async () => {
                const name = document.getElementById('newLinkName').value.trim();
                const url = document.getElementById('newLinkUrl').value.trim();
                if (!name || !url) { showToast('请填写完整'); return; }
                await sb.from('profile').insert([{ type: 'link', name, url }]);
                showToast('链接添加成功！');
                loadProfile();
            });

            document.getElementById('logoutBtn')?.addEventListener('click', () => {
                isAdmin = false;
                document.getElementById('loginRow').style.display = 'flex';
                document.getElementById('adminContent').style.display = 'none';
                container.innerHTML = '';
                document.getElementById('adminPassword').value = '';
            });
        }

        // ========== 初始加载 ==========
        loadQuestions();
        loadProfile();
        setInterval(() => { loadQuestions(); loadProfile(); }, 10000);
    </script>
</body>
</html>
